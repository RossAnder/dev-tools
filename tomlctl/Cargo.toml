[package]
name = "tomlctl"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
authors = ["Ross Anderson"]
description = "Small TOML read/write CLI for Claude Code flow + ledger files"
license = "MIT OR Apache-2.0"

[[bin]]
name = "tomlctl"
path = "src/main.rs"

[dependencies]
toml = { version = "^1.1", features = ["preserve_order"] }
serde_json = "^1"
clap = { version = "^4", default-features = false, features = [
    "std",
    "derive",
    "help",
    "usage",
] }
anyhow = "^1"
tempfile = "^3"
fs4 = "^0.13"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
panic = "abort"
strip = true

[profile.dev.package."*"]
opt-level = 2
