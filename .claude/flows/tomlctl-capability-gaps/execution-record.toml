[[items]]
id = "E8"
type = "deviation"
date = 2026-04-18
agent = "implement"
task_ref = "error-format-json"
summary = "anyhow chain().find_map(downcast_ref) doesn't work; used Error::downcast_ref directly. Also moved message inside TaggedError to preserve byte-identical text mode."
original_intent = "Use anyhow's Error::chain() iterator + downcast_ref per plan sketch; attach TaggedError via .context()"
rationale = "Trait-object downcast doesn't see anyhow's internal context wrappers — chain().find_map returns None. anyhow's inherent Error::downcast_ref method understands its own context. Separately, .context(TaggedError) inserts a ': ' separator that breaks byte-identical text mode; putting the message inside TaggedError.message and emitting it verbatim via Display avoids the artifact."
commits = ["9900443"]

