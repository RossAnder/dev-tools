[[items]]
category = "security"
description = "Surfaced self-referentially during /review-apply R1-R4 run on 2026-04-17: review-apply.md was untracked (created this session, never `git add`-ed), so the R3/R4 insertion diffs didn't appear in either `git diff HEAD` or `git diff --cached` output. Under a strict reading of R4's rule, R3 and R4 would have been downgraded to wontfix despite being genuinely applied (grep confirmed the inserted content at lines 393 and 363). Fix: extend the R4 verification to union the diff output with `git ls-files --others --exclude-standard` (untracked, non-ignored files). Amended logic: `files_changed = (git diff --name-only HEAD) ∪ (git diff --name-only --cached) ∪ (git ls-files --others --exclude-standard)`. Only downgrade if file is absent from this broader union."
effort = "trivial"
file = "claude/commands/review-apply.md"
first_flagged = 2026-04-17
id = "R40"
line = 363
related = ["R4"]
rounds = 1
severity = "warning"
status = "open"
summary = "R4's diff-verification rule checks `git diff HEAD` + `git diff --cached` but misses untracked files — an `applied R{n}` claim on a newly-created (uncommitted) file fails verification and would be incorrectly downgraded"
symbol = "Verify agent-reported `applied` claims"
