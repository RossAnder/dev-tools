summary = "No batch operation: /optimise-apply with 10 findings spawns 10 tomlctl processes, each full-parsing and full-rewriting the ledger"
description = """Each items add/update/remove is one CLI invocation doing full fs::read + toml::from_str + O(n) scan + toml::to_string_pretty + fs::write. For a 100-item ledger with a 10-finding apply run: ~10 × (5-15ms process spawn + 0.3-1ms parse + 0.5-1ms serialise + 2-4ms fs I/O) = 100-250ms, vs ~15-30ms for a single batched invocation — an order of magnitude win. The proper fix is a new subcommand tomlctl items apply <file> --ops '[{"op":"update","id":"O1","json":{...}}, {"op":"add","json":{...}}, ...]' that parses once, builds a HashMap<id, patch> (O(k)), makes one pass over items applying matches (O(n+k) instead of O(n·k) in the degenerate branch), then writes once. Pairs with O2's atomic-rename (one atomic rewrite per batch vs N) and enables true cross-op transactional semantics (all-or-nothing: if any op fails the file isn't touched). Per-item commands stay as-is for one-shot use; callers that want batching opt into apply."""
