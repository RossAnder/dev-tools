resolution = "Mixed std::process::id() into jittered_delay_ms seed via (attempt ^ pid) XOR before wrapping_mul; both with_exclusive_lock and with_shared_lock retry loops inherit automatically. Decorrelates concurrent writers retry schedules across processes while preserving per-process attempt-keyed variation."

