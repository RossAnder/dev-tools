[[items]]
id = "O1"
file = "tomlctl/src/main.rs"
line = 285
symbol = "toml_to_json / json_to_toml"
severity = "warning"
effort = "medium"
category = "serialization"
summary = "Hand-rolled recursive DOM converters allocate a full parallel tree on every read and write"
description = "Every read path (parse, get, items list, items get, items next-id) builds an owned toml::Value, then toml_to_json clones the whole tree into a serde_json::Value (fresh Map per table, Vec per array, String::clone per key/value), then serde_json::to_string_pretty walks that tree a third time to build a String. Write paths symmetrically parse JSON into a serde_json::Value and then json_to_toml rebuilds a parallel TomlValue before serialise. Replace with serde_transcode: pair a toml::Deserializer over the borrowed source with a serde_json::Serializer::pretty(BufWriter) and transcode streams straight to stdout without an intermediate DOM. For mutation paths keep a single shallow DOM, but bypass the second conversion by deserialising JSON patches directly into TomlValue via serde::Deserialize. Tradeoff: the silent YYYY-MM-DD → Datetime coercion in json_to_toml must move into an explicit adapter (see O6). Combined with O10 (borrowed DeTable), read paths touch zero intermediate allocations."
evidence = [
    "https://docs.rs/serde-transcode",
    "https://serde.rs/transcode.html",
    "src/main.rs:285-303 (toml_to_json), 305-338 (json_to_toml)",
]
first_flagged = 2026-04-17
rounds = 1
status = "applied"
resolution = "print_json switched to streaming serde_json::to_writer_pretty(BufWriter(stdout)); full serde_transcode deferred (Datetime would flatten to tagged map, breaking test assertions on plain ISO strings)"
resolved = 2026-04-17

[[items]]
id = "O2"
file = "tomlctl/src/main.rs"
line = 197
symbol = "write_toml"
severity = "warning"
effort = "small"
category = "concurrency"
summary = "fs::write is non-atomic: a kill, panic, or power loss between truncate and stream-complete leaves a corrupt ledger"
description = "write_toml calls fs::write(path, s) which opens the target with O_TRUNC|O_WRONLY, destroying the old content before the new bytes land. A Ctrl-C that escalates to SIGKILL, OOM, taskkill /F, or a crash mid-write produces a zero-length or partial file — every subsequent tomlctl call then fails at toml::from_str, blocking the running slash-command flow. Fix with tempfile::NamedTempFile::new_in(parent_dir), write the full output there via a BufWriter, then .persist(path). This maps to atomic rename(2) on POSIX and MoveFileExW(MOVEFILE_REPLACE_EXISTING) on NTFS — readers see either the old complete file or the new complete file, never an interrupted stream. Secondary wins: eliminates the peak-heap bump from to_string_pretty building a full String before the write, and defeats signal-interrupted corruption entirely (F1 covers SIGKILL in a way a ctrlc handler cannot). Combine with panic=unwind or explicit drop(named) on the error path so the tmp file cannot leak if a panic fires between new_in and persist."
evidence = [
    "https://docs.rs/tempfile/latest/tempfile/struct.NamedTempFile.html",
    "https://docs.rs/atomic-write-file",
    "src/main.rs:195-198",
]
first_flagged = 2026-04-17
rounds = 1
status = "applied"
resolution = "write_toml now uses tempfile::NamedTempFile::new_in(parent) + persist(path) for atomic rename; dep tempfile=^3"
resolved = 2026-04-17

