symbol = "print_json"
severity = "suggestion"
effort = "trivial"
category = "serialization"
summary = "to_string_pretty + println! allocates a full output String before writing; to_writer_pretty over BufWriter(stdout().lock()) skips it"
description = '''println!("{}", serde_json::to_string_pretty(v)?) allocates the entire serialised output as a String, then Display copies it to stdout's linewise buffer. serde_json explicitly documents the streaming pattern: let w = BufWriter::new(io::stdout().lock()); serde_json::to_writer_pretty(&mut w, v)?; w.write_all(b"\n")? — skips the intermediate String and the second traversal. Wins are small in absolute terms (printing a ≤100KB ledger dump) but pure upside: less heap pressure, less peak memory, fewer allocations. Error handling shifts to io::Error at the boundary — wrap with anyhow::Context as elsewhere. Pairs naturally with O1 (if transcoding straight to writer, no intermediate at all).'''
evidence = [
    "https://docs.rs/serde_json — 'Serialize Data to IO Writers with Serde'",
    "src/main.rs:200-203",
]
