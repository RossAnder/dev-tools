[[items]]
id = "O2"
file = "tomlctl/src/main.rs"
line = 197
symbol = "write_toml"
severity = "warning"
effort = "small"
category = "concurrency"
summary = "fs::write is non-atomic: a kill, panic, or power loss between truncate and stream-complete leaves a corrupt ledger"
description = "write_toml calls fs::write(path, s) which opens the target with O_TRUNC|O_WRONLY, destroying the old content before the new bytes land. A Ctrl-C that escalates to SIGKILL, OOM, taskkill /F, or a crash mid-write produces a zero-length or partial file — every subsequent tomlctl call then fails at toml::from_str, blocking the running slash-command flow. Fix with tempfile::NamedTempFile::new_in(parent_dir), write the full output there via a BufWriter, then .persist(path). This maps to atomic rename(2) on POSIX and MoveFileExW(MOVEFILE_REPLACE_EXISTING) on NTFS — readers see either the old complete file or the new complete file, never an interrupted stream. Secondary wins: eliminates the peak-heap bump from to_string_pretty building a full String before the write, and defeats signal-interrupted corruption entirely (F1 covers SIGKILL in a way a ctrlc handler cannot). Combine with panic=unwind or explicit drop(named) on the error path so the tmp file cannot leak if a panic fires between new_in and persist."
evidence = [
    "https://docs.rs/tempfile/latest/tempfile/struct.NamedTempFile.html",
    "https://docs.rs/atomic-write-file",
    "src/main.rs:195-198",
]
