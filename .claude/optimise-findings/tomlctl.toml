[[items]]
id = "O4"
file = "tomlctl/src/main.rs"
line = 0
symbol = "items_dispatch / Cmd::Set"
severity = "warning"
effort = "small"
category = "concurrency"
summary = "Read-modify-write has no advisory file lock: two concurrent tomlctl invocations silently lose each other's updates"
description = "Every mutating command (Set, SetJson, items Add/Update/Remove) is a classic RMW sequence (read_toml → mutate in memory → write_toml) with no lock. Two concurrent invocations against the same ledger — e.g. two Claude Code sessions in the same repo, or a future parallel-apply flow — both read the old state, both write their own new state, and the loser's mutations vanish. Symptom is a silent missing ledger row, which is harder to notice than a crash-corrupt file. Fix: wrap the RMW block with an fs4 (maintained successor to fs2) exclusive advisory lock on the target or a sidecar .lock file. fs4 maps to flock(LOCK_EX) on POSIX and LockFileEx(LOCKFILE_EXCLUSIVE_LOCK) on Windows; both are advisory but honoured by every cooperating tomlctl invocation. Helper with_exclusive_lock(path, |file| { read; mutate; write }) keeps the scope tight. Severity is warning, not critical, because realistic usage today is single-user single-session; the scenario is plausible but not default."
evidence = [
    "https://lib.rs/crates/fs4",
    "src/main.rs:129-141 Set/SetJson, 163-180 items ops — none use fs4/fd-lock/file-guard",
]
first_flagged = 2026-04-17
rounds = 1
status = "applied"
resolution = "Added with_exclusive_lock helper using fs4::fs_std::FileExt::lock_exclusive on sidecar <path>.lock file, wrapping every mutating command body; dep fs4=^0.13"
resolved = 2026-04-17

