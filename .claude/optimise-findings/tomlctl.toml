description = "Every unique (target path → SHA-256 hex) combination creates a permanent lock file under .claude/.locks/. A project with 50 flow directories × 5 ledger files produces 250 lock files monotonically. No TTL sweep, no GC on drop, no cleanup subcommand. Safe deletion of advisory lock files requires the rename-then-unlink + st_nlink check trick to avoid TOCTOU between unlink and a concurrent opener. Suggested implementation: a `tomlctl locks gc` subcommand that opens each .lock, calls try_lock, and unlinks if successful (the next concurrent caller's open(create=true) will simply re-create it; the rename-trick handles the race). Peer concern to O45 which addressed accumulation via .gitignore convention; this is the active-cleanup follow-up. Currently unbounded growth."
