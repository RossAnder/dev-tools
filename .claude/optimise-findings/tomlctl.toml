summary = "Any JSON string matching YYYY-MM-DD is silently rewritten as a TOML Datetime, risking corruption of non-date strings of that shape"
description = 'The string arm of json_to_toml unconditionally calls looks_like_date(s) + s.parse::<Datetime>() and promotes to TomlValue::Datetime on success. This is applied everywhere JSON becomes TOML (set-json, items add, items update). A legitimate string that happens to match — short numeric IDs formatted as YYYY-MM-DD, version tags, placeholders like 0000-00-00 — gets silently type-mutated into a TOML date literal. Round-trip then returns it as a string (because toml_to_json stringifies Datetime), masking the loss. Preferred fix: narrow the coercion to a whitelist of known date-valued keys from the ledger/context schema (created, updated, first_flagged, last_updated, resolved, date). Alternative: drop coercion entirely and make callers pass dates via a {"$date":"..."} tagged form. Narrowed whitelist is backwards-compatible, low-risk, and preserves the current ergonomics for the ledger schema. Pairs with O1: if serde_transcode replaces the converters, the coercion moves into a custom serde::de::Deserializer adapter.'
evidence = [
    "src/main.rs:318-325 coercion logic",
    "src/main.rs:275-283 looks_like_date (syntactic only)",
]
